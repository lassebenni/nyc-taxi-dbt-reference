version: 2

sources:
  - name: nyc_taxi
    description: Raw NYC yellow taxi trip records and zone lookup on Databricks (Unity Catalog).
    database: hyf
    schema: nyc_yellow
    tables:
      - name: raw_trips
        description: One row per yellow taxi trip, 2023-2025 (~128M rows).
      - name: raw_zones
        description: NYC taxi zone lookup (265 rows mapping location IDs to boroughs).
